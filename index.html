<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Station Météo V6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.5em; }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-title { font-size: 0.9em; color: #999; text-transform: uppercase; margin-bottom: 10px; }
        .card-value { font-size: 3em; font-weight: bold; color: #667eea; }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }
        .status-ok { background: #e8f5e9; color: #2e7d32; }
        .status-warning { background: #fff3e0; color: #e65100; }
        .status-danger { background: #ffebee; color: #c62828; }
        .charts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .history {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #667eea; color: white; padding: 15px; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; }
        .bell-icon {
            font-size: 2em;
            cursor: pointer;
        }
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8em;
            display: none;
        }
        .notification-badge.active { display: flex; }
        .notifications-panel {
            position: fixed;
            top: 70px;
            right: 20px;
            width: 350px;
            max-height: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            overflow-y: auto;
        }
        .notifications-panel.active { display: block; }
        .notification-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            border-left: 4px solid #ff6b6b;
        }
        .notification-item.warning { border-left-color: #ffa500; background: #fff8e1; }
        .notification-title { font-weight: bold; margin-bottom: 5px; }
        .ai-button {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            font-size: 2.2em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 999;
        }
        .ai-panel {
            position: fixed;
            bottom: 110px;
            left: 30px;
            width: 380px;
            max-height: 550px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 999;
            display: none;
            overflow-y: auto;
        }
        .ai-panel.active { display: block; }
        .ai-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .ai-content { padding: 20px; }
        .ai-advice {
            background: #f0f4ff;
            padding: 15px;
            border-left: 4px solid #667eea;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        .ai-advice-title { font-weight: bold; color: #667eea; margin-bottom: 10px; }
        footer { text-align: center; color: white; margin-top: 30px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>🌡️ Station Météo V6</h1>
                <p style="color: rgba(255,255,255,0.8);">Monitoring temps réel - by Nathan</p>
            </div>
            <div style="position: relative;">
                <div class="bell-icon" onclick="toggleNotifications()">
                    🔔
                    <div class="notification-badge" id="notificationBadge">0</div>
                </div>
            </div>
        </header>
        
        <div class="notifications-panel" id="notificationsPanel">
            <div style="padding: 15px; background: #f5f5f5; font-weight: bold;">📬 Notifications</div>
            <div id="notificationsList"></div>
        </div>
        
        <div class="dashboard">
            <div class="card">
                <div style="font-size: 3em; margin-bottom: 10px;">🌡️</div>
                <div class="card-title">Température</div>
                <div class="card-value" id="temp">--</div>
                <div>°C</div>
            </div>
            
            <div class="card">
                <div style="font-size: 3em; margin-bottom: 10px;">💧</div>
                <div class="card-title">Humidité</div>
                <div class="card-value" id="humidity">--</div>
                <div>%</div>
                <div id="humidityStatus" class="status status-ok"></div>
            </div>
            
            <div class="card">
                <div style="font-size: 3em; margin-bottom: 10px;">💨</div>
                <div class="card-title">Gaz</div>
                <div class="card-value" id="gas">--</div>
                <div id="gasStatus" class="status status-ok"></div>
            </div>
        </div>
        
        <div class="charts">
            <div class="chart-card">
                <h3 style="margin-bottom: 20px;">📈 Température (24h)</h3>
                <canvas id="tempChart"></canvas>
            </div>
            
            <div class="chart-card">
                <h3 style="margin-bottom: 20px;">💧 Humidité (24h)</h3>
                <canvas id="humidityChart"></canvas>
            </div>
        </div>
        
        <div class="history">
            <h2 style="margin-bottom: 20px;">📋 Historique</h2>
            <table>
                <thead>
                    <tr>
                        <th>Heure</th>
                        <th>Température</th>
                        <th>Humidité</th>
                        <th>Gaz</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="4">Chargement...</td></tr>
                </tbody>
            </table>
        </div>
        
        <button class="ai-button" onclick="toggleAIPanel()">🤖</button>
        
        <div class="ai-panel" id="aiPanel">
            <div class="ai-header">
                🤖 Assistant IA
                <button onclick="toggleAIPanel()" style="background: none; border: none; color: white; cursor: pointer; font-size: 1.2em;">✕</button>
            </div>
            <div class="ai-content">
                <div id="aiAdviceContainer"></div>
                <button onclick="generateAdvice()" style="width: 100%; padding: 12px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px;">💡 Obtenir des conseils</button>
            </div>
        </div>
        
        <footer>
            <p>Station Météo V6 © 2024 | Actualisation: 30s</p>
        </footer>
    </div>
    
    <script>
        let tempChart, humidityChart;
        let notifications = [];
        let currentData = null;
        
        const MOCK_DATA = [
            { temp: 22.5, humidity: 55, gas: 'BAS', heure: 14, minute: 0 },
            { temp: 23.1, humidity: 58, gas: 'BAS', heure: 14, minute: 5 },
            { temp: 23.5, humidity: 60, gas: 'BAS', heure: 14, minute: 10 },
            { temp: 23.8, humidity: 62, gas: 'BAS', heure: 14, minute: 15 },
            { temp: 24.2, humidity: 65, gas: 'BAS', heure: 14, minute: 20 },
            { temp: 24.5, humidity: 67, gas: 'MOYEN', heure: 14, minute: 25 },
            { temp: 24.8, humidity: 68, gas: 'MOYEN', heure: 14, minute: 30 },
            { temp: 25.1, humidity: 70, gas: 'MOYEN', heure: 14, minute: 35 },
        ];
        
        window.addEventListener('load', function() {
            initCharts();
            fetchData();
            setInterval(fetchData, 30000);
        });
        
        function initCharts() {
            const tempCtx = document.getElementById('tempChart').getContext('2d');
            tempChart = new Chart(tempCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Température (°C)',
                        data: [],
                        borderColor: '#ff6b6b',
                        backgroundColor: 'rgba(255, 107, 107, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } } }
            });
            
            const humidityCtx = document.getElementById('humidityChart').getContext('2d');
            humidityChart = new Chart(humidityCtx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Humidité (%)',
                        data: [],
                        borderColor: '#4ecdc4',
                        backgroundColor: 'rgba(78, 205, 196, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                    }]
                },
                options: { responsive: true, plugins: { legend: { display: true } } }
            });
        }
        
        function fetchData() {
            fetch('/data.json')
                .then(r => r.json())
                .then(data => {
                    const measurements = data.measurements || MOCK_DATA;
                    if (measurements.length > 0) {
                        currentData = measurements[measurements.length - 1];
                        updateUI(measurements);
                    }
                })
                .catch(() => {
                    currentData = MOCK_DATA[MOCK_DATA.length - 1];
                    updateUI(MOCK_DATA);
                });
        }
        
        function updateUI(data) {
            document.getElementById('temp').textContent = currentData.temp.toFixed(1);
            document.getElementById('humidity').textContent = Math.round(currentData.humidity);
            document.getElementById('gas').textContent = currentData.gas;
            
            updateHumidityStatus(currentData.humidity);
            updateGasStatus(currentData.gas);
            updateHistory(data);
            updateCharts(data);
            checkNotifications(currentData);
        }
        
        function updateHumidityStatus(humidity) {
            const el = document.getElementById('humidityStatus');
            if (humidity < 40) {
                el.textContent = '🏜️ SEC';
                el.className = 'status status-warning';
            } else if (humidity < 60) {
                el.textContent = '✅ OK';
                el.className = 'status status-ok';
            } else if (humidity < 75) {
                el.textContent = '⚠️ MOYEN';
                el.className = 'status status-warning';
            } else {
                el.textContent = '🚨 ÉLEVÉ';
                el.className = 'status status-danger';
            }
        }
        
        function updateGasStatus(gas) {
            const el = document.getElementById('gasStatus');
            if (gas === 'BAS') {
                el.textContent = '✅ BAS';
                el.className = 'status status-ok';
            } else if (gas === 'MOYEN') {
                el.textContent = '⚠️ MOYEN';
                el.className = 'status status-warning';
            } else if (gas === 'ELEV') {
                el.textContent = '🚨 ÉLEVÉ';
                el.className = 'status status-danger';
            } else {
                el.textContent = '🔴 FEU!';
                el.className = 'status status-danger';
            }
        }
        
        function updateHistory(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.slice(-20).reverse().forEach(item => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${item.heure}:${String(item.minute).padStart(2, '0')}</td>
                    <td>${item.temp.toFixed(1)}°C</td>
                    <td>${Math.round(item.humidity)}%</td>
                    <td>${item.gas}</td>
                `;
            });
        }
        
        function updateCharts(data) {
            const labels = data.map(d => `${d.heure}:${String(d.minute).padStart(2, '0')}`);
            const temps = data.map(d => d.temp);
            const humidities = data.map(d => d.humidity);
            
            tempChart.data.labels = labels;
            tempChart.data.datasets[0].data = temps;
            tempChart.update();
            
            humidityChart.data.labels = labels;
            humidityChart.data.datasets[0].data = humidities;
            humidityChart.update();
        }
        
        function checkNotifications(data) {
            if (data.humidity < 40) addNotification('⚠️ Humidité BASSE', `${Math.round(data.humidity)}%`);
            if (data.humidity > 75) addNotification('⚠️ Humidité ÉLEVÉE', `${Math.round(data.humidity)}%`);
            if (data.gas === 'ELEV' || data.gas === 'FEU!') addNotification('🚨 ALERTE GAZ', data.gas);
        }
        
        function addNotification(title, msg) {
            if (!notifications.find(n => n.title === title)) {
                notifications.unshift({ title, msg });
                if (notifications.length > 10) notifications.pop();
                updateNotificationUI();
            }
        }
        
        function updateNotificationUI() {
            const badge = document.getElementById('notificationBadge');
            badge.textContent = notifications.length;
            badge.classList.toggle('active', notifications.length > 0);
            
            const list = document.getElementById('notificationsList');
            list.innerHTML = notifications.map(n => `
                <div class="notification-item">
                    <div class="notification-title">${n.title}</div>
                    <div>${n.msg}</div>
                </div>
            `).join('');
        }
        
        function toggleNotifications() {
            document.getElementById('notificationsPanel').classList.toggle('active');
        }
        
        function toggleAIPanel() {
            document.getElementById('aiPanel').classList.toggle('active');
        }
        
        function generateAdvice() {
            const advices = [];
            if (currentData.temp < 15) advices.push({ title: '🌡️ Froid', text: 'Temp basse, augmenter chauffage' });
            else if (currentData.temp > 30) advices.push({ title: '🌡️ Chaud', text: 'Temp élevée, ventiler' });
            
            if (currentData.humidity < 40) advices.push({ title: '💧 Sec', text: 'Air sec, utiliser humidificateur' });
            else if (currentData.humidity > 75) advices.push({ title: '💧 Humide', text: 'Trop humide, ventiler' });
            
            if (currentData.gas !== 'BAS') advices.push({ title: '💨 Gaz', text: 'Améliorer ventilation' });
            
            if (advices.length === 0) advices.push({ title: '✅ Tout va bien', text: 'Conditions idéales' });
            
            document.getElementById('aiAdviceContainer').innerHTML = advices.map(a => `
                <div class="ai-advice">
                    <div class="ai-advice-title">${a.title}</div>
                    ${a.text}
                </div>
            `).join('');
        }
    </script>
</body>
</html>
